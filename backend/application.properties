# VeraLens — Application Configuration
server.port=8080

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Logging
logging.level.com.veralens=DEBUG
logging.level.root=WARN

# App name
spring.application.name=veralens-detector
